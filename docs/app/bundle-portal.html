<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Opening bundle…</title>
  <style>
    html, body {
      margin: 0; height: 100%;
      background: #08080f;
      color: #9090c0;
      font-family: ui-sans-serif, system-ui, sans-serif;
      font-size: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    #msg { text-align: center; line-height: 1.6; }
    .err { color: #f87171; }
  </style>
</head>
<body>
  <div id="msg">Opening bundle…</div>
  <script>
    const s = new URLSearchParams(location.search).get('s');
    if (!s) {
      document.getElementById('msg').textContent = 'Invalid session.';
    } else {
      const TIMEOUT_MS = 30000;
      const start = Date.now();

      function openDB() {
        return new Promise((resolve, reject) => {
          /* Each session has its own isolated database — bundles cannot
             enumerate or access other sessions' databases by name. */
          const req = indexedDB.open('portableweb-' + s, 1);
          req.onsuccess = () => resolve(req.result);
          req.onerror = () => reject(req.error);
        });
      }

      async function poll(db) {
        if (Date.now() - start > TIMEOUT_MS) {
          document.getElementById('msg').innerHTML =
            '<span class="err">Timed out waiting for bundle data.</span>';
          return;
        }
        const tx = db.transaction('bundle-files', 'readonly');
        const req = tx.objectStore('bundle-files').get('manifest.json');
        req.onsuccess = () => {
          if (req.result) {
            try {
              const manifest = JSON.parse(new TextDecoder().decode(req.result.data));
              if (!manifest.entry) throw new Error('manifest.json missing entry field');
              location.replace('/app/bundle/' + s + '/' + manifest.entry);
            } catch (e) {
              document.getElementById('msg').innerHTML =
                '<span class="err">Invalid bundle: ' + e.message + '</span>';
            }
          } else {
            setTimeout(() => poll(db), 200);
          }
        };
        req.onerror = () => setTimeout(() => poll(db), 200);
      }

      openDB().then(poll).catch(() => {
        document.getElementById('msg').innerHTML =
          '<span class="err">Could not open local storage.</span>';
      });
    }
  </script>
</body>
</html>
